  syntax_highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - README.md
include:
  - assets
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
