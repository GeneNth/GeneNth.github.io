<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - 基因N方 Explore Genes, Share Fun{% else %}基因N方 Explore Genes, Share Fun{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="基因,基因N方,GeneNth,生物学,音乐,基因表达,生物信息学">
  <meta name="author" content="{{ site.author }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/logo.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- tsParticles 粒子库 -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <style>
    #tsparticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    /* 确保内容层在粒子之上 */
    .page-wrapper {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!-- 粒子背景层 -->
  <div id="tsparticles"></div>
  
  <div class="page-wrapper">
    <header class="site-header">
      <div class="header-inner">
        <div class="site-brand">
          <img src="{{ '/assets/logo.png' | relative_url }}" alt="{{ site.title }}" class="site-logo">
          <div class="site-meta">
            <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
            <p class="site-slogan">{{ site.slogan }}</p>
          </div>
        </div>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">首页</a>
          <a href="{{ '/about/' | relative_url }}" class="nav-link{% if page.url == '/about/' %} active{% endif %}">关于</a>
        </nav>
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} · Explore Genes, Share Fun</p>
        <p>Powered by <a href="https://jekyllrb.com" target="_blank">Jekyll</a> & <a href="https://pages.github.com" target="_blank">GitHub Pages</a></p>
      </div>
    </footer>
  </div>

  <!-- 粒子系统初始化 -->
  <script>
    tsParticles.load("tsparticles", {
      fullScreen: { enable: false },
      particles: {
        number: { 
          value: 60, 
          density: { enable: true, value_area: 800 } 
        },
        color: { value: "#e91e63" },
        shape: { type: "circle" },
        opacity: { 
          value: 0.3, 
          random: true,
          anim: { enable: true, speed: 0.5, opacity_min: 0.1, sync: false }
        },
        size: { 
          value: 2, 
          random: true,
          anim: { enable: true, speed: 2, size_min: 0.1, sync: false }
        },
        move: {
          enable: true,
          speed: 0.8,
          direction: "none",
          random: true,
          straight: false,
          out_mode: "out",
          bounce: false
        },
        links: {
          enable: true,
          distance: 120,
          color: "#e91e63",
          opacity: 0.15,
          width: 1
        }
      },
      interactivity: {
        detect_on: "canvas",
        events: {
          onhover: { enable: true, mode: "grab" },
          onclick: { enable: true, mode: "push" },
          resize: true
        },
        modes: {
          grab: { distance: 140, line_linked: { opacity: 0.5 } },
          push: { particles_nb: 3 }
        }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
