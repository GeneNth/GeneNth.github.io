<script>
(function() {
  'use strict';

  function togglePlay(audioId, btn) {
    const audio = document.getElementById(audioId);
    if (!audio) return;

    const playIcon = btn.querySelector('.play-icon');
    const pauseIcon = btn.querySelector('.pause-icon');

    if (audio.paused) {
      document.querySelectorAll('audio').forEach(a => {
        if (a.id !== audioId) {
          a.pause();
          a.currentTime = 0;
        }
      });
      document.querySelectorAll('.play-btn').forEach(b => {
        if (b !== btn) {
          const pi = b.querySelector('.play-icon');
          const pai = b.querySelector('.pause-icon');
          if (pi) pi.style.display = '';
          if (pai) pai.style.display = 'none';
        }
      });

      audio.play();
      if (playIcon) playIcon.style.display = 'none';
      if (pauseIcon) pauseIcon.style.display = '';
    } else {
      audio.pause();
      if (playIcon) playIcon.style.display = '';
      if (pauseIcon) pauseIcon.style.display = 'none';
    }
  }

  function seek(event, audioId) {
    const audio = document.getElementById(audioId);
    if (!audio || !audio.duration) return;
    const bar = event.currentTarget;
    const percent = event.offsetX / bar.offsetWidth;
    audio.currentTime = percent * audio.duration;
  }

  function formatTime(seconds) {
    if (isNaN(seconds)) return '00:00';
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // 适配 audio-xxx 和 audioxxx 两种 ID 格式
  document.querySelectorAll('audio').forEach(audio => {
    const suffix = audio.id.replace(/^audio-?/, '');

    audio.addEventListener('timeupdate', () => {
      const bar = document.getElementById('progress-' + suffix) || 
                  document.getElementById('progress' + suffix);
      const cur = document.getElementById('current-' + suffix) ||
                  document.getElementById('current' + suffix);
      if (bar) bar.style.width = (audio.currentTime / audio.duration * 100) + '%';
      if (cur) cur.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      const dur = document.getElementById('duration-' + suffix) ||
                  document.getElementById('duration' + suffix);
      if (dur && dur.textContent === '00:00') dur.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
      const btn = document.querySelector(`button[onclick*="'audio-${suffix}'"]`) ||
                  document.querySelector(`button[onclick*="audio-${suffix}"]`);
      if (btn) {
        const pi = btn.querySelector('.play-icon');
        const pai = btn.querySelector('.pause-icon');
        if (pi) pi.style.display = '';
        if (pai) pai.style.display = 'none';
      }
    });
  });

  window.togglePlay = togglePlay;
  window.seek = seek;
})();
</script>
